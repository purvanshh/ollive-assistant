services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ollive-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - sqlite_data:/app/data
      - ./evaluation/results.json:/app/evaluation/results.json
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/ollive.db}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FRONTIER_MODEL=${FRONTIER_MODEL:-gemini-2.5-flash}
      - OSS_MODEL_NAME=${OSS_MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - JUDGE_MODEL=${JUDGE_MODEL:-gpt-4.1-mini}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://us.cloud.langfuse.com}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - E2B_API_KEY=${E2B_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ollive-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ollive-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ollive-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollive-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ollive-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  sqlite_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ollive-network:
    driver: bridge
